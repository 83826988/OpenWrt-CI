name: OpenROS Builder

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: '源码仓库'
        required: true
        default: 'openwrt/openwrt'
        type: string
      source_branch:
        description: '源码分支'
        required: true
        default: 'openwrt-25.12'
        type: string
      add_feeds:
        description: '添加Feeds'
        required: false
        default: 'src-git design https://github.com/cairongzeng/luci-theme-design.git'
        type: string
      target:
        description: '设备架构'
        required: true
        default: 'airoha'
        type: string
      subtarget:
        description: '设备芯片'
        required: true
        default: 'an7581'
        type: string
      profile:
        description: '型号配置'
        required: true
        default: 'bell_xg-040g-md'
        type: string
      packages:
        description: '定制软件'
        required: false
        default: 'luci-app-arpbind luci-app-daed luci-app-diskman luci-app-eoip luci-app-ksmbd luci-app-tailscale-community luci-app-usb-printer luci-app-vlmcsd luci-theme-argon tailscale'
        type: string

jobs:
  build-firmware:
    name: 构建 ${{ github.event.inputs.profile }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: 初始化环境
        run: |
          echo "BUILD_TIME=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV
          echo "TARGET=${{ github.event.inputs.target }}" >> $GITHUB_ENV
          echo "SUBTARGET=${{ github.event.inputs.subtarget }}" >> $GITHUB_ENV
          echo "PROFILE=${{ github.event.inputs.profile }}" >> $GITHUB_ENV
          echo "PACKAGES=${{ github.event.inputs.packages }}" >> $GITHUB_ENV
          echo "ADD_FEEDS=${{ github.event.inputs.add_feeds }}" >> $GITHUB_ENV
          sudo mkdir -p /mnt/openwrt
          sudo chown -R runner:runner /mnt/openwrt

      - name: 检出源码
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.source_repo }}
          ref: ${{ github.event.inputs.source_branch }}

      - name: 移动源码
        run: |
          mv ${{ github.workspace }} /mnt/openwrt/openwrt-src
          ln -sfn /mnt/openwrt/openwrt-src ${{ github.workspace }}

      - name: 安装编译工具
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk gettext git default-jre-headless libacl1-dev libcap-dev libelf-dev libffi-dev libgmp-dev libisl-dev libjansson-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libssl-dev libtool libz-dev python3 python3-setuptools python3-pip python3-full rsync subversion swig time unzip wget zlib1g-dev libxml-parser-perl liblzma-dev liblzo2-dev zstd libzstd-dev libjson-c-dev libfuse-dev libpcre2-dev libpcre3-dev

      - name: 配置和更新Feeds
        run: |
          cd /mnt/openwrt/openwrt-src
          
          if [ -n "${ADD_FEEDS}" ]; then
            echo "${ADD_FEEDS}" | sed '/^$/d' >> feeds.conf.default
          fi
          
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          if [ -n "${PACKAGES}" ]; then
            CLEANED_PACKAGES=$(echo "${PACKAGES}" | xargs)
            mkdir -p feeds/missing_packages/luci/applications
            mkdir -p feeds/missing_packages/packages
            
            for pkg in $CLEANED_PACKAGES; do
              [ -z "$pkg" ] && continue
              
              if ! ./scripts/feeds list | grep -q "^$pkg"; then
                
                if [[ "$pkg" == luci-app-* ]]; then
                  LUCI_TEMP_DIR="/tmp/luci-$pkg-$(date +%s)"
                  rm -rf "$LUCI_TEMP_DIR"
                  mkdir -p "$LUCI_TEMP_DIR"
                  cd "$LUCI_TEMP_DIR"
                  
                  git init
                  git config core.sparsecheckout true
                  echo "applications/$pkg" >> .git/info/sparse-checkout
                  git remote add origin https://github.com/immortalwrt/luci.git
                  git pull --depth=1 origin master 2>/dev/null || git pull --depth=1 origin main 2>/dev/null || true
                  
                  if [ -d "applications/$pkg" ]; then
                    cp -r "applications/$pkg" "/mnt/openwrt/openwrt-src/feeds/missing_packages/luci/applications/"
                  fi
                  
                  rm -rf "$LUCI_TEMP_DIR"
                  cd /mnt/openwrt/openwrt-src
                else
                  PKG_TEMP_DIR="/tmp/packages-$pkg-$(date +%s)"
                  rm -rf "$PKG_TEMP_DIR"
                  mkdir -p "$PKG_TEMP_DIR"
                  cd "$PKG_TEMP_DIR"
                  
                  git clone --depth=1 --filter=blob:none --sparse https://github.com/immortalwrt/packages.git 2>/dev/null || true
                  if [ -d packages ]; then
                    cd packages
                    
                    for dir in net misc admin routing telephony; do
                      if [ -d "$dir/$pkg" ]; then
                        mkdir -p "/mnt/openwrt/openwrt-src/feeds/missing_packages/packages/$dir"
                        cp -r "$dir/$pkg" "/mnt/openwrt/openwrt-src/feeds/missing_packages/packages/$dir/"
                        break
                      fi
                    done
                  fi
                  
                  rm -rf "$PKG_TEMP_DIR"
                  cd /mnt/openwrt/openwrt-src
                fi
              fi
            done
            
            if [ -n "$(find feeds/missing_packages -type f -name 'Makefile' 2>/dev/null | head -1)" ]; then
              echo 'src-link missing_packages feeds/missing_packages' >> feeds.conf.default
              ./scripts/feeds update missing_packages
              ./scripts/feeds install -a
            fi
          fi

      - name: 生成和修改配置
        run: |
          cd /mnt/openwrt/openwrt-src
          set -e
          
          echo "CONFIG_TARGET_${TARGET}=y" >> .config
          echo "CONFIG_TARGET_${TARGET}_${SUBTARGET}=y" >> .config
          echo "CONFIG_TARGET_${TARGET}_${SUBTARGET}_DEVICE_${PROFILE}=y" >> .config
          
          make defconfig
          
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-ssl=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-base-zh_Hans=y" >> .config
          
          echo 'CONFIG_TARGET_HOSTNAME="OpenROS"' >> .config
          echo 'CONFIG_VERSION_DIST="OpenROS"' >> .config
          echo 'CONFIG_VERSION_NICK="QQ | WeChat 83826988"' >> .config
          
          echo 'CONFIG_PACKAGE_luci-theme-bootstrap=n' >> .config
          echo 'CONFIG_LUCI_THEME="design"' >> .config
          echo 'CONFIG_PACKAGE_luci-theme-design=y' >> .config
          echo 'CONFIG_PACKAGE_luci-i18n-design-zh_Hans=y' >> .config
          
          echo "CONFIG_BUSYBOX_DEFAULT_FEATURE_CHECK_UTF8=y" >> .config
          echo "CONFIG_BUSYBOX_DEFAULT_UNICODE_SUPPORT=y" >> .config
          echo "CONFIG_BUSYBOX_DEFAULT_UNICODE_USING_LOCALE=y" >> .config
          
          if [ -n "${PACKAGES}" ]; then
            CLEANED_PACKAGES=$(echo "${PACKAGES}" | xargs)
            
            for pkg in $CLEANED_PACKAGES; do
              [ -z "$pkg" ] && continue
              
              echo "CONFIG_PACKAGE_${pkg}=y" >> .config
              
              if [[ "$pkg" == luci-app-* ]]; then
                app_name="${pkg#luci-app-}"
                zh_Hans_pkg="luci-i18n-${app_name}-zh_Hans"
                echo "CONFIG_PACKAGE_${zh_Hans_pkg}=y" >> .config
              fi
              
              if [[ "$pkg" == luci-theme-* ]]; then
                theme_name="${pkg#luci-theme-}"
                zh_Hans_pkg="luci-i18n-${theme_name}-zh_Hans"
                echo "CONFIG_PACKAGE_${zh_Hans_pkg}=y" >> .config
              fi
            done
          fi
          
          yes "" | make oldconfig
          
          sed -i "s/ipaddr='192\.168\.1\.1'/ipaddr='192.168.8.1'/" package/base-files/files/bin/config_generate
          
          CONFIG_GENERATE="package/base-files/files/bin/config_generate"
          if [ -f "$CONFIG_GENERATE" ]; then
            sed -i "s/set system\\.@system\\[-1\\]\\.hostname=.*/set system.@system[-1].hostname='OpenROS'/" "$CONFIG_GENERATE"
            sed -i "/set system\.@system\[-1\]\.hostname=/s/.*/&\nset system.@system[-1].timezone='CST-8'\nset system.@system[-1].zonename='Asia\/Shanghai'/" "$CONFIG_GENERATE"
          fi
          
          if [ -f "package/base-files/files/etc/immortalwrt_release" ] || grep -q 'DISTRIB_ID.*ImmortalWrt' "package/base-files/files/etc/os-release" 2>/dev/null; then
              REPO_TYPE="immortalwrt"
              RELEASE_FILE="package/base-files/files/etc/immortalwrt_release"
          else
              REPO_TYPE="openwrt"
              RELEASE_FILE="package/base-files/files/etc/openwrt_release"
          fi
          
          if [ -f "$RELEASE_FILE" ]; then
            sed -i "s/DISTRIB_ID=.*/DISTRIB_ID='OpenROS'/" "$RELEASE_FILE"
            sed -i "s/DISTRIB_DESCRIPTION=.*/DISTRIB_DESCRIPTION='OpenROS'/" "$RELEASE_FILE"
            echo "DISTRIB_NICK='QQ | WeChat 83826988'" >> "$RELEASE_FILE"
          fi
          
          OS_RELEASE="package/base-files/files/etc/os-release"
          if [ -f "$OS_RELEASE" ]; then
            sed -i "s/NAME=.*/NAME='OpenROS'/" "$OS_RELEASE"
            sed -i "s/PRETTY_NAME=.*/PRETTY_NAME='OpenROS'/" "$OS_RELEASE"
          fi
          
          OPKG_DISTFEEDS_CONF="package/base-files/files/etc/opkg/distfeeds.conf"
          if [ -f "$OPKG_DISTFEEDS_CONF" ]; then
            sed -i '/downloads\.\(openwrt\|immortalwrt\)\.org/!{ /mirrors\.pku\.edu\.cn/!d }' "$OPKG_DISTFEEDS_CONF"
            
            if [ "$REPO_TYPE" = "immortalwrt" ]; then
              sed -i "s|https://downloads\.immortalwrt\.org|https://mirrors.pku.edu.cn/immortalwrt|g" "$OPKG_DISTFEEDS_CONF"
              sed -i "s|http://downloads\.immortalwrt\.org|https://mirrors.pku.edu.cn/immortalwrt|g" "$OPKG_DISTFEEDS_CONF"
            else
              sed -i "s|https://downloads\.openwrt\.org|https://mirrors.pku.edu.cn/openwrt|g" "$OPKG_DISTFEEDS_CONF"
              sed -i "s|http://downloads\.openwrt\.org|https://mirrors.pku.edu.cn/openwrt|g" "$OPKG_DISTFEEDS_CONF"
            fi
          fi
          
          APK_DISTFEEDS_LIST="package/base-files/files/etc/apk/repositories.d/distfeeds.list"
          if [ -f "$APK_DISTFEEDS_LIST" ]; then
            sed -i '/downloads\.\(openwrt\|immortalwrt\)\.org/!{ /mirrors\.pku\.edu\.cn/!d }' "$APK_DISTFEEDS_LIST"
            
            if [ "$REPO_TYPE" = "immortalwrt" ]; then
              sed -i "s|https://downloads\.immortalwrt\.org|https://mirrors.pku.edu.cn/immortalwrt|g" "$APK_DISTFEEDS_LIST"
              sed -i "s|http://downloads\.immortalwrt\.org|https://mirrors.pku.edu.cn/immortalwrt|g" "$APK_DISTFEEDS_LIST"
            else
              sed -i "s|https://downloads\.openwrt\.org|https://mirrors.pku.edu.cn/openwrt|g" "$APK_DISTFEEDS_LIST"
              sed -i "s|http://downloads\.openwrt\.org|https://mirrors.pku.edu.cn/openwrt|g" "$APK_DISTFEEDS_LIST"
            fi
          fi
          
          ./scripts/diffconfig.sh

      - name: 编译固件
        run: |
          cd /mnt/openwrt/openwrt-src
          set -e
          make download -j$(nproc) || make download -j1 V=s
          make -j$(nproc) V=sc || make -j1 V=s

      - name: 准备发布
        if: success()
        run: |
          mkdir -p ${{ github.workspace }}/release_assets
          cp -r /mnt/openwrt/openwrt-src/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/* ${{ github.workspace }}/release_assets/
          
          PACKAGES_DIR="/mnt/openwrt/openwrt-src/bin/packages"
          if [ -d "$PACKAGES_DIR" ]; then
            cd /mnt/openwrt/openwrt-src/bin
            tar -czf ${{ github.workspace }}/release_assets/openros-${{ env.PROFILE }}-packages-${{ env.BUILD_TIME }}.tar.gz packages/
          fi

      - name: 上传固件
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openros-${{ env.PROFILE }}-${{ env.BUILD_TIME }}
          path: ${{ github.workspace }}/release_assets/
          retention-days: 1

      - name: 创建发布
        if: success()
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: openros-${{ env.PROFILE }}-${{ env.BUILD_TIME }}
          name: OpenROS ${{ env.PROFILE }} ${{ env.BUILD_TIME }}
          body: |
            设备: ${{ env.PROFILE }}
            架构: ${{ env.TARGET }}/${{ env.SUBTARGET }}
            主机名: OpenROS
            默认IP: 192.168.8.1
            默认时区: Asia/Shanghai (CST-8)
            技术支持: QQ | WeChat 83826988
          files: ${{ github.workspace }}/release_assets/*
          draft: false
          prerelease: false