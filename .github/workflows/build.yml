name: OpenROS Builder

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: '源码仓库'
        required: true
        default: 'openwrt/openwrt'
        type: string
      source_branch:
        description: '源码分支'
        required: true
        default: 'openwrt-25.12'
        type: string
      add_feeds:
        description: '添加feeds源'
        required: false
        type: string
      target:
        description: '设备架构'
        required: true
        default: 'airoha'
        type: string
      subtarget:
        description: '设备芯片'
        required: true
        default: 'an7581'
        type: string
      profile:
        description: '型号配置'
        required: true
        default: 'bell_xg-040g-md'
        type: string
      packages:
        description: '定制软件'
        required: false
        default: 'luci-app-arpbind luci-app-daed luci-app-diskman luci-app-eoip luci-app-ksmbd luci-app-usb-printer luci-app-vlmcsd luci-theme-argon'
        type: string

jobs:
  build-firmware:
    name: 构建 ${{ github.event.inputs.profile }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: 初始化环境
        run: |
          echo "BUILD_TIME=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV
          echo "TARGET=${{ github.event.inputs.target }}" >> $GITHUB_ENV
          echo "SUBTARGET=${{ github.event.inputs.subtarget }}" >> $GITHUB_ENV
          echo "PROFILE=${{ github.event.inputs.profile }}" >> $GITHUB_ENV
          echo "PACKAGES=${{ github.event.inputs.packages }}" >> $GITHUB_ENV
          sudo mkdir -p /mnt/openros
          sudo chown -R $(whoami):$(whoami) /mnt/openros

      - name: 检出源码
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.source_repo }}
          ref: ${{ github.event.inputs.source_branch }}

      - name: 移动源码
        run: |
          mv ${{ github.workspace }} /mnt/openros/openros-src
          ln -sfn /mnt/openros/openros-src ${{ github.workspace }}

      - name: 安装编译工具
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk gettext git default-jre-headless libacl1-dev libcap-dev libelf-dev libffi-dev libgmp-dev libisl-dev libjansson-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libssl-dev libtool libz-dev python3 python3-setuptools python3-pip python3-full rsync subversion swig time unzip wget zlib1g-dev libxml-parser-perl liblzma-dev liblzo2-dev zstd libzstd-dev libjson-c-dev libfuse-dev libpcre2-dev libpcre3-dev bison flex

      - name: 准备编译环境
        run: |
          set -e
          cd /mnt/openros/openros-src
          
          if [ ! -f scripts/config/conf ]; then
            if ! make scripts/config/conf V=s; then
              echo "错误：配置工具构建失败，流程终止"
              exit 1
            fi
          fi
          
          echo "src-git packages https://git.openwrt.org/feed/packages.git" > feeds.conf.default
          echo "src-git luci https://git.openwrt.org/project/luci.git" >> feeds.conf.default
          echo "src-git routing https://git.openwrt.org/feed/routing.git" >> feeds.conf.default
          echo "src-git telephony https://git.openwrt.org/feed/telephony.git" >> feeds.conf.default
          
          if [ -n "${{ github.event.inputs.add_feeds }}" ]; then
            echo "${{ github.event.inputs.add_feeds }}" > feeds.conf.default
          fi
          
          for i in {1..3}; do
            if ./scripts/feeds update -a; then
              break
            elif [ $i -eq 3 ]; then
              echo "错误：Feeds更新失败，流程终止"
              exit 1
            fi
            sleep 15
          done
          
          if ! ./scripts/feeds install -a; then
            echo "错误：Feeds安装失败，流程终止"
            exit 1
          fi
          
          ./scripts/feeds install luci-i18n-base-zh-cn 2>&1 | grep -v "already installed" || true

      - name: 生成目标基础配置
        run: |
          set -e
          cd /mnt/openros/openros-src
          rm -f .config .config.old
          echo "CONFIG_TARGET_${TARGET}=y" > .config
          echo "CONFIG_TARGET_${TARGET}_${SUBTARGET}=y" >> .config
          echo "CONFIG_TARGET_${TARGET}_${SUBTARGET}_DEVICE_${PROFILE}=y" >> .config
          echo 'CONFIG_TARGET_HOSTNAME="OpenROS"' >> .config
          echo "CONFIG_TARGET_ZONEINFO_PRC=y" >> .config
          echo "CONFIG_TARGET_ZONEINFO_ASIA=y" >> .config
          echo 'CONFIG_VERSION_DIST="OpenROS"' >> .config
          make defconfig

      - name: 通过菜单配置启用中文包
        run: |
          set -e
          cd /mnt/openros/openros-src
          echo "创建自动化配置脚本..."
          cat > /tmp/configure.exp << 'SCRIPT_EOF'
set timeout 30
spawn make menuconfig
expect "Arrow"
send "\033\[B\033\[B\033\[B\033\[B\033\[B\033\[B\033\[B\033\[B\033\[B\033\[B"
send "\033\[B\033\[B\033\[B\033\[B"
send "\r"
expect "Arrow"
send "\033\[B"
send "\033\[B"
send " "
expect "Arrow"
send "\r"
send "\033\[Z"
expect "save"
send "\r"
expect eof
SCRIPT_EOF
          
          echo "安装expect工具并运行自动化配置..."
          sudo apt-get install -y expect
          expect /tmp/configure.exp
          echo "菜单配置完成。"

      - name: 追加自定义软件包
        run: |
          set -e
          cd /mnt/openros/openros-src
          if [ -n "${PACKAGES}" ]; then
            for pkg in ${PACKAGES}; do
              [ -z "$pkg" ] && continue
              if ! make config "PACKAGE_${pkg}=y" 2>/dev/null; then
                sed -i "/^CONFIG_PACKAGE_${pkg}=/d" .config 2>/dev/null || true
                echo "CONFIG_PACKAGE_${pkg}=y" >> .config
              fi
            done
            make defconfig 2>/dev/null || true
          fi

      - name: 最终验证与强制补救
        run: |
          set -e
          cd /mnt/openros/openros-src
          echo "最终配置验证："
          CN_STATUS=$(grep -q '^CONFIG_PACKAGE_luci-i18n-base-zh-cn=y' .config && echo '✅' || echo '❌')
          echo "- luci-i18n-base-zh-cn: ${CN_STATUS}"
          
          if [ "${CN_STATUS}" = "❌" ]; then
            echo "执行最终强制补救..."
            sed -i '/^\(# \)\?CONFIG_PACKAGE_luci-i18n-base-zh-cn[ =]/d' .config
            echo "" >> .config
            echo "# 强制启用中文语言包" >> .config
            echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y" >> .config
            make defconfig 2>/dev/null || true
            grep -q '^CONFIG_PACKAGE_luci-i18n-base-zh-cn=y' .config && echo "状态: ✅ 成功" || echo "状态: ❌ 失败"
          fi

      - name: 编译固件
        run: |
          set -e
          cd /mnt/openros/openros-src
          make download -j$(nproc) || make download -j1 V=s
          make -j$(nproc) V=sc

      - name: 准备发布
        if: success()
        run: |
          mkdir -p ${{ github.workspace }}/release_assets
          cp -r /mnt/openros/openros-src/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/* ${{ github.workspace }}/release_assets/
          cp /mnt/openros/openros-src/.config ${{ github.workspace }}/release_assets/${{ env.PROFILE }}.config
          if [ -d "/mnt/openros/openros-src/bin/packages" ]; then
            cd /mnt/openros/openros-src/bin
            tar -czf ${{ github.workspace }}/release_assets/openros-${{ env.PROFILE }}-packages-${{ env.BUILD_TIME }}.tar.gz packages/
          fi

      - name: 上传固件
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openros-${{ env.PROFILE }}-${{ env.BUILD_TIME }}
          path: ${{ github.workspace }}/release_assets/
          retention-days: 1

      - name: 创建发布
        if: success()
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: openros-${{ env.PROFILE }}-${{ env.BUILD_TIME }}
          name: OpenROS ${{ env.PROFILE }} ${{ env.BUILD_TIME }}
          body: |
            设备: ${{ env.PROFILE }}
            架构: ${{ env.TARGET }}/${{ env.SUBTARGET }}
            技术支持: QQ | WeChat 83826988
          files: ${{ github.workspace }}/release_assets/*
          draft: false
          prerelease: false