name: OpenROS Builder

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: '源码仓库'
        required: true
        default: 'openwrt/openwrt'
        type: string
      source_branch:
        description: '源码分支'
        required: true
        default: 'openwrt-25.12'
        type: string
      add_feeds:
        description: '添加feeds源'
        required: false
        type: string
      target:
        description: '设备架构'
        required: true
        default: 'airoha'
        type: string
      subtarget:
        description: '设备芯片'
        required: true
        default: 'an7581'
        type: string
      profile:
        description: '型号配置'
        required: true
        default: 'bell_xg-040g-md'
        type: string
      packages:
        description: '定制软件'
        required: false
        default: 'luci-app-arpbind luci-app-daed luci-app-diskman luci-app-eoip luci-app-ksmbd luci-app-usb-printer luci-app-vlmcsd luci-theme-argon'
        type: string

jobs:
  build-firmware:
    name: 构建 ${{ github.event.inputs.profile }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: 初始化环境
        run: |
          echo "BUILD_TIME=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV
          echo "TARGET=${{ github.event.inputs.target }}" >> $GITHUB_ENV
          echo "SUBTARGET=${{ github.event.inputs.subtarget }}" >> $GITHUB_ENV
          echo "PROFILE=${{ github.event.inputs.profile }}" >> $GITHUB_ENV
          echo "PACKAGES=${{ github.event.inputs.packages }}" >> $GITHUB_ENV
          sudo mkdir -p /mnt/openros
          sudo chown -R $(whoami):$(whoami) /mnt/openros

      - name: 检出源码
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.source_repo }}
          ref: ${{ github.event.inputs.source_branch }}

      - name: 移动源码
        run: |
          mv ${{ github.workspace }} /mnt/openros/openros-src
          ln -sfn /mnt/openros/openros-src ${{ github.workspace }}

      - name: 安装编译工具
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk gettext git default-jre-headless libacl1-dev libcap-dev libelf-dev libffi-dev libgmp-dev libisl-dev libjansson-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libssl-dev libtool libz-dev python3 python3-setuptools python3-pip python3-full rsync subversion swig time unzip wget zlib1g-dev libxml-parser-perl liblzma-dev liblzo2-dev zstd libzstd-dev libjson-c-dev libfuse-dev libpcre2-dev libpcre3-dev bison flex

      - name: 配置和更新Feeds
        run: |
          cd /mnt/openros/openros-src
          if [ -n "${{ github.event.inputs.add_feeds }}" ]; then
            echo "${{ github.event.inputs.add_feeds }}" >> feeds.conf.default
          fi
          for i in {1..3}; do
            if ./scripts/feeds update -a; then
              break
            elif [ $i -eq 3 ]; then
              echo "feeds更新失败"
              exit 1
            fi
            sleep 10
          done
          ./scripts/feeds install -a

      - name: 生成配置
        run: |
          cd /mnt/openros/openros-src
          rm -f .config .config.old
          echo "CONFIG_TARGET_${TARGET}=y" > .config
          echo "CONFIG_TARGET_${TARGET}_${SUBTARGET}=y" >> .config
          echo "CONFIG_TARGET_${TARGET}_${SUBTARGET}_DEVICE_${PROFILE}=y" >> .config
          echo "CONFIG_TARGET_ROOTFS_INITRAMFS=n" >> .config
          echo "CONFIG_TARGET_ROOTFS_SQUASHFS=y" >> .config
          echo "CONFIG_TARGET_ROOTFS_EXT4FS=y" >> .config
          echo "CONFIG_TARGET_IMAGES_GZIP=y" >> .config
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=256" >> .config
          echo "CONFIG_TARGET_HOSTNAME=\"OpenROS\"" >> .config
          echo "CONFIG_TARGET_ZONEINFO_PRC=y" >> .config
          echo "CONFIG_TARGET_ZONEINFO_ASIA=y" >> .config
          echo "CONFIG_DEFAULT_busybox=y" >> .config
          echo "CONFIG_BUSYBOX_DEFAULT_USE_BB_PWD_GRP=y" >> .config
          echo "CONFIG_BUSYBOX_DEFAULT_USE_BB_SHADOW=y" >> .config
          echo "CONFIG_DEFAULT_locales=y" >> .config
          echo "CONFIG_DEFAULT_libc=y" >> .config
          make defconfig

      - name: 定制软件
        run: |
          cd /mnt/openros/openros-src
          
          if [ ! -x scripts/config ]; then
            make scripts/config
          fi
          
          ./scripts/config --enable CONFIG_PACKAGE_luci
          ./scripts/config --enable CONFIG_PACKAGE_luci-base
          ./scripts/config --enable CONFIG_PACKAGE_luci-i18n-base-zh-cn
          ./scripts/config --enable CONFIG_PACKAGE_luci-lib-ipkg
          
          if [ -n "${PACKAGES}" ]; then
            for pkg in ${PACKAGES}; do
              [ -z "$pkg" ] && continue
              echo "尝试启用: ${pkg}"
              ./scripts/config --enable CONFIG_PACKAGE_${pkg} 2>/dev/null || true
            done
          fi
          
          make defconfig
          
          echo "========== 配置验证 =========="
          echo "目标: ${TARGET}/${SUBTARGET}/${PROFILE}"
          echo ""
          echo "关键包状态:"
          echo "- luci: $(grep -q '^CONFIG_PACKAGE_luci=y' .config && echo '✅' || echo '❌')"
          echo "- luci-base: $(grep -q '^CONFIG_PACKAGE_luci-base=y' .config && echo '✅' || echo '❌')"
          echo "- luci-i18n-base-zh-cn: $(grep -q '^CONFIG_PACKAGE_luci-i18n-base-zh-cn=y' .config && echo '✅' || echo '❌')"
          echo "- luci-lib-ipkg: $(grep -q '^CONFIG_PACKAGE_luci-lib-ipkg=y' .config && echo '✅' || echo '❌')"
          echo ""
          echo "定制应用状态:"
          if [ -n "${PACKAGES}" ]; then
            for pkg in ${PACKAGES}; do
              [ -z "$pkg" ] && continue
              pkg_config="CONFIG_PACKAGE_${pkg}"
              if grep -q "^${pkg_config}=y" .config; then
                echo "✅ ${pkg} (已启用)"
              elif grep -q "^${pkg_config}=m" .config; then
                echo "🔶 ${pkg} (模块化)"
              else
                echo "❌ ${pkg} (未生效)"
              fi
            done
          else
            echo "无"
          fi
          echo ""
          echo "配置文件统计:"
          echo "总配置行数: $(wc -l < .config)"

      - name: 编译固件
        run: |
          cd /mnt/openros/openros-src
          make download -j$(nproc) || make download -j1 V=s
          make -j$(nproc) V=sc

      - name: 准备发布
        if: success()
        run: |
          mkdir -p ${{ github.workspace }}/release_assets
          cp -r /mnt/openros/openros-src/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/* ${{ github.workspace }}/release_assets/
          cp /mnt/openros/openros-src/.config ${{ github.workspace }}/release_assets/openros-${{ env.PROFILE }}-config-${{ env.BUILD_TIME }}
          if [ -d "/mnt/openros/openros-src/bin/packages" ]; then
            cd /mnt/openros/openros-src/bin
            tar -czf ${{ github.workspace }}/release_assets/openros-${{ env.PROFILE }}-packages-${{ env.BUILD_TIME }}.tar.gz packages/
          fi

      - name: 上传固件
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openros-${{ env.PROFILE }}-${{ env.BUILD_TIME }}
          path: ${{ github.workspace }}/release_assets/
          retention-days: 1

      - name: 创建发布
        if: success()
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: openros-${{ env.PROFILE }}-${{ env.BUILD_TIME }}
          name: OpenROS ${{ env.PROFILE }} ${{ env.BUILD_TIME }}
          body: |
            设备: ${{ env.PROFILE }}
            架构: ${{ env.TARGET }}/${{ env.SUBTARGET }}
            技术支持: QQ | WeChat 83826988
          files: ${{ github.workspace }}/release_assets/*
          draft: false
          prerelease: false